<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="DodgersStyle.css" rel="stylesheet">
    <meta name="theme-color" content="#005A9C">
    <title>Dodgers Schedule</title>
</head>
<body class="bg-dark">
    
    <div class="container-fluid p-3"> 
        <div class="row justify-content-center"> 
            <div class="col-12 col-md-8 col-lg-6">
                <div id="dodgers-schedule" class="DodgersFont-Border shadow-lg">
                    <div class="DodgersHeader text-center">
                        Dodgers Schedule - <span id="current-date"></span>
                    </div>
                    
                    <div class="p-2 bg-dark border-bottom border-secondary">
                        <select id="month-filter" class="form-select DodgersSearch">
                            <option value="all">All Months</option>
                            <option value="0">January</option>
                            <option value="1">February</option>
                            <option value="2">March</option>
                            <option value="3">April</option>
                            <option value="4">May</option>
                            <option value="5">June</option>
                            <option value="6">July</option>
                            <option value="7">August</option>
                            <option value="8">September</option>
                            <option value="9">October</option>
                            <option value="10">November</option>
                            <option value="11">December</option>
                        </select>
                    </div>

                    <ul id="game-list" class="DodgersList">
                        <li class="DodgerListItem">Loading games...</li>
                    </ul>
                </div>
            </div>
        </div> 
    </div>

    <script src="DodgersScript.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
