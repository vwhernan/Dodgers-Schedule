<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="apple-touch-icon" href="hello.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playball&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="DodgersStyle.css">
    <title>Dodgers Schedule</title>
</head>
<body class="bg-dark">
    <div class="myBody container-fluid p-0">
        <div class="row gx-3 m-0 justify-content-center">
            <div class="col-12 col-lg-7 col-xl-6">
                <div id="dodgers-schedule" class="DodgersFont-Border shadow-lg mt-3">
                    <div class="DodgersHeader text-center">
                        <p>Dodgers Schedule <span id="current-date" class="myDate"></span></p>
                    </div>
                    
                    <div class="p-2 bg-dark border-bottom border-secondary">
                        <select id="month-filter" class="form-select DodgersSearch">
                            <option value="all">All Months</option>
                            <option value="0">January</option>
                            <option value="1">February</option>
                            <option value="2">March</option>
                            <option value="3">April</option>
                            <option value="4">May</option>
                            <option value="5">June</option>
                            <option value="6">July</option>
                            <option value="7">August</option>
                            <option value="8">September</option>
                            <option value="9">October</option>
                            <option value="10">November</option>
                            <option value="11">December</option>
                        </select>
                    </div>

                    <div class="ListDiv">
                        <ul class="ListHeaderUl list-group p-0 m-0">
                            <li class="ListHeaderli list-group-item">
                                <span class="col-date">Date</span>
                                <span class="col-game">Game</span>
                                <span class="col-score">Score</span>
                                <span class="col-time">Time</span>
                                <span class="col-promo d-none d-md-block">Promotions</span>
                            </li>
                        </ul>
                        <ul id="game-list" class="DodgersList list-group p-0 m-0">
                            <li class="DodgerListItem list-group-item">Loading games...</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="DodgersScript.js"></script>
</body>
</html>
