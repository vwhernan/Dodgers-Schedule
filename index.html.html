<html lang="en" data-bs-theme="dark"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="DodgersStyle.css" rel="styleSheet">
    <title>Dodgers Schedule</title>
  </head>
  <body>
    
    <body class="bg-dark">
    <div class="container-fluid p-3"> 
        <div class="row justify-content-center"> 
            
            <div class="col-12 col-md-8 col-lg-6">
                <div id="dodgers-schedule" class="DodgersFont-Border shadow-lg">
                    <div class="DodgersHeader text-center">
                        Dodgers Schedule - <span id="current-date"></span>
                    </div>
                    
                    <div class="p-2 bg-dark border-bottom border-secondary">
                        <select id="month-filter" class="form-select DodgersSearch">
                            </select>
                    </div>

                    <ul id="game-list" class="DodgersList">
                        <li class="DodgerListItem">Loading games...</li>
                    </ul>
                </div>
            </div>

    
          
          
          <!--  FOR ADDITIONAL WIDGETS
          <div class="col-lg-4">

                  <div class="card-header">Another Widget</div>
                  <div class="card-body">
                      <p>Add news, stats, or your ImageCycle here!</p>
                  </div>
              </div>
          </div>
          -->
      </div> 
  </div>
  <script src="DodgersScript.js"></script>
  <script src="ImageCycle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
